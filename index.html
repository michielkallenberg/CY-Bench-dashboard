<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CY-Bench dashboards</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --bg: #f6f8fa;
      --card: #fff;
      --border: #d8dee4;
      --text: #1f2328;
      --muted: #656d76;
      --accent: #0969da;
      --accent-soft: #ddf4ff;
      --land: #e8eaed;
      --land-available: #9ec5fe;
      --land-active: #0969da;
      --land-missing: #f0f0f0;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      padding: 1.25rem;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .page { max-width: 1200px; margin: 0 auto; }
    h1 { margin: 0; font-size: 1.5rem; font-weight: 600; }
    h2 { margin: 0 0 0.75rem; font-size: 1.05rem; font-weight: 600; }
    .lead { margin: 0.35rem 0 1rem; color: var(--muted); }
    .top-links { display: flex; flex-wrap: wrap; gap: 0.65rem; margin-bottom: 1rem; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      font-size: 0.88rem;
    }
    .pill:hover { border-color: var(--accent); background: var(--accent-soft); }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 1rem;
      align-items: start;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.65rem;
    }
    .toolbar button {
      padding: 0.35rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 0.86rem;
    }
    .toolbar button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .muted { color: var(--muted); font-size: 0.88rem; }
    #map-wrap { width: 100%; overflow: hidden; }
    #map-wrap svg { display: block; width: 100%; height: auto; }
    .country {
      stroke: #fff;
      stroke-width: 0.5px;
      cursor: default;
      transition: fill 0.15s;
    }
    .country.available { cursor: pointer; }
    .country.available:hover { filter: brightness(0.92); }
    .country.selected { stroke: var(--text); stroke-width: 1.2px; }
    #detail h3 { margin: 0 0 0.35rem; font-size: 1rem; }
    #detail .cc { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.75rem; }
    .dash-link {
      display: block;
      padding: 0.55rem 0.65rem;
      margin-bottom: 0.45rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      background: #fafbfc;
    }
    .dash-link:hover { border-color: var(--accent); background: var(--accent-soft); }
    .dash-link.disabled {
      opacity: 0.45;
      pointer-events: none;
    }
    .legend { margin-top: 0.65rem; display: flex; gap: 1rem; flex-wrap: wrap; }
    .legend span { display: inline-flex; align-items: center; gap: 0.35rem; }
    .swatch {
      width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border);
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>CY-Bench dashboards</h1>
      <p class="lead">Click a country on the map to open walk-forward dashboards. Colors reflect the selected forecast horizon.</p>
    </header>

    <div class="top-links" id="top-links"></div>

    <div class="layout">
      <div class="card">
        <div class="toolbar">
          <span class="muted">Horizon</span>
          <button type="button" data-horizon="both" class="active">Both</button>
          <button type="button" data-horizon="eos">End of season</button>
          <button type="button" data-horizon="mid">Mid-season</button>
        </div>
        <div id="map-wrap"><p class="muted">Loading map…</p></div>
        <div class="legend muted">
          <span><i class="swatch" style="background:var(--land-available)"></i> Dashboard available</span>
          <span><i class="swatch" style="background:var(--land-missing)"></i> No dashboard</span>
        </div>
      </div>
      <div class="card" id="detail">
        <h3>Select a country</h3>
        <p class="muted">Click a highlighted country on the map.</p>
      </div>
    </div>
  </div>

  <script>
    const DATA = {"countries": [{"cc": "AO", "map_cc": "AO", "name": "Angola", "eos": "ao_walk_forward_eos_v1/dashboard.html", "mid": "ao_walk_forward_mid_v1/dashboard.html"}, {"cc": "AR", "map_cc": "AR", "name": "Argentina", "eos": "ar_walk_forward_eos_v1/dashboard.html", "mid": "ar_walk_forward_mid_v1/dashboard.html"}, {"cc": "AU", "map_cc": "AU", "name": "Australia", "eos": "au_walk_forward_eos_v1/dashboard.html", "mid": "au_walk_forward_mid_v1/dashboard.html"}, {"cc": "AT", "map_cc": "AT", "name": "Austria", "eos": "at_walk_forward_eos_v1/dashboard.html", "mid": "at_walk_forward_mid_v1/dashboard.html"}, {"cc": "BE", "map_cc": "BE", "name": "Belgium", "eos": "be_walk_forward_eos_v1/dashboard.html", "mid": "be_walk_forward_mid_v1/dashboard.html"}, {"cc": "BR", "map_cc": "BR", "name": "Brazil", "eos": "br_walk_forward_eos_v1/dashboard.html", "mid": "br_walk_forward_mid_v1/dashboard.html"}, {"cc": "BG", "map_cc": "BG", "name": "Bulgaria", "eos": "bg_walk_forward_eos_v1/dashboard.html", "mid": "bg_walk_forward_mid_v1/dashboard.html"}, {"cc": "BF", "map_cc": "BF", "name": "Burkina Faso", "eos": "bf_walk_forward_eos_v1/dashboard.html", "mid": "bf_walk_forward_mid_v1/dashboard.html"}, {"cc": "TD", "map_cc": "TD", "name": "Chad", "eos": "td_walk_forward_eos_v1/dashboard.html", "mid": "td_walk_forward_mid_v1/dashboard.html"}, {"cc": "CN", "map_cc": "CN", "name": "China", "eos": "cn_walk_forward_eos_v1/dashboard.html", "mid": "cn_walk_forward_mid_v1/dashboard.html"}, {"cc": "HR", "map_cc": "HR", "name": "Croatia", "eos": "hr_walk_forward_eos_v1/dashboard.html", "mid": "hr_walk_forward_mid_v1/dashboard.html"}, {"cc": "CZ", "map_cc": "CZ", "name": "Czechia", "eos": "cz_walk_forward_eos_v1/dashboard.html", "mid": "cz_walk_forward_mid_v1/dashboard.html"}, {"cc": "DK", "map_cc": "DK", "name": "Denmark", "eos": "dk_walk_forward_eos_v1/dashboard.html", "mid": "dk_walk_forward_mid_v1/dashboard.html"}, {"cc": "EE", "map_cc": "EE", "name": "Estonia", "eos": "ee_walk_forward_eos_v1/dashboard.html", "mid": "ee_walk_forward_mid_v1/dashboard.html"}, {"cc": "ET", "map_cc": "ET", "name": "Ethiopia", "eos": "et_walk_forward_eos_v1/dashboard.html", "mid": "et_walk_forward_mid_v1/dashboard.html"}, {"cc": "FI", "map_cc": "FI", "name": "Finland", "eos": "fi_walk_forward_eos_v1/dashboard.html", "mid": "fi_walk_forward_mid_v1/dashboard.html"}, {"cc": "FR", "map_cc": "FR", "name": "France", "eos": "fr_walk_forward_eos_v1/dashboard.html", "mid": "fr_walk_forward_mid_v1/dashboard.html"}, {"cc": "DE", "map_cc": "DE", "name": "Germany", "eos": "de_walk_forward_eos_v1/dashboard.html", "mid": "de_walk_forward_mid_v1/dashboard.html"}, {"cc": "EL", "map_cc": "GR", "name": "Greece", "eos": "el_walk_forward_eos_v1/dashboard.html", "mid": "el_walk_forward_mid_v1/dashboard.html"}, {"cc": "HU", "map_cc": "HU", "name": "Hungary", "eos": "hu_walk_forward_eos_v1/dashboard.html", "mid": "hu_walk_forward_mid_v1/dashboard.html"}, {"cc": "IN", "map_cc": "IN", "name": "India", "eos": "in_walk_forward_eos_v1/dashboard.html", "mid": "in_walk_forward_mid_v1/dashboard.html"}, {"cc": "IE", "map_cc": "IE", "name": "Ireland", "eos": "ie_walk_forward_eos_v1/dashboard.html", "mid": "ie_walk_forward_mid_v1/dashboard.html"}, {"cc": "IT", "map_cc": "IT", "name": "Italy", "eos": "it_walk_forward_eos_v1/dashboard.html", "mid": "it_walk_forward_mid_v1/dashboard.html"}, {"cc": "LV", "map_cc": "LV", "name": "Latvia", "eos": "lv_walk_forward_eos_v1/dashboard.html", "mid": "lv_walk_forward_mid_v1/dashboard.html"}, {"cc": "LS", "map_cc": "LS", "name": "Lesotho", "eos": "ls_walk_forward_eos_v1/dashboard.html", "mid": "ls_walk_forward_mid_v1/dashboard.html"}, {"cc": "LT", "map_cc": "LT", "name": "Lithuania", "eos": "lt_walk_forward_eos_v1/dashboard.html", "mid": "lt_walk_forward_mid_v1/dashboard.html"}, {"cc": "MG", "map_cc": "MG", "name": "Madagascar", "eos": "mg_walk_forward_eos_v1/dashboard.html", "mid": "mg_walk_forward_mid_v1/dashboard.html"}, {"cc": "MW", "map_cc": "MW", "name": "Malawi", "eos": "mw_walk_forward_eos_v1/dashboard.html", "mid": "mw_walk_forward_mid_v1/dashboard.html"}, {"cc": "ML", "map_cc": "ML", "name": "Mali", "eos": "ml_walk_forward_eos_v1/dashboard.html", "mid": "ml_walk_forward_mid_v1/dashboard.html"}, {"cc": "MX", "map_cc": "MX", "name": "Mexico", "eos": "mx_walk_forward_eos_v1/dashboard.html", "mid": "mx_walk_forward_mid_v1/dashboard.html"}, {"cc": "MZ", "map_cc": "MZ", "name": "Mozambique", "eos": "mz_walk_forward_eos_v1/dashboard.html", "mid": "mz_walk_forward_mid_v1/dashboard.html"}, {"cc": "NL", "map_cc": "NL", "name": "Netherlands", "eos": "nl_walk_forward_eos_v1/dashboard.html", "mid": "nl_walk_forward_mid_v1/dashboard.html"}, {"cc": "NE", "map_cc": "NE", "name": "Niger", "eos": "ne_walk_forward_eos_v1/dashboard.html", "mid": "ne_walk_forward_mid_v1/dashboard.html"}, {"cc": "PL", "map_cc": "PL", "name": "Poland", "eos": "pl_walk_forward_eos_v1/dashboard.html", "mid": "pl_walk_forward_mid_v1/dashboard.html"}, {"cc": "PT", "map_cc": "PT", "name": "Portugal", "eos": "pt_walk_forward_eos_v1/dashboard.html", "mid": "pt_walk_forward_mid_v1/dashboard.html"}, {"cc": "RO", "map_cc": "RO", "name": "Romania", "eos": "ro_walk_forward_eos_v1/dashboard.html", "mid": "ro_walk_forward_mid_v1/dashboard.html"}, {"cc": "SN", "map_cc": "SN", "name": "Senegal", "eos": "sn_walk_forward_eos_v1/dashboard.html", "mid": "sn_walk_forward_mid_v1/dashboard.html"}, {"cc": "SK", "map_cc": "SK", "name": "Slovakia", "eos": "sk_walk_forward_eos_v1/dashboard.html", "mid": "sk_walk_forward_mid_v1/dashboard.html"}, {"cc": "ZA", "map_cc": "ZA", "name": "South Africa", "eos": "za_walk_forward_eos_v1/dashboard.html", "mid": "za_walk_forward_mid_v1/dashboard.html"}, {"cc": "ES", "map_cc": "ES", "name": "Spain", "eos": "es_walk_forward_eos_v1/dashboard.html", "mid": "es_walk_forward_mid_v1/dashboard.html"}, {"cc": "SE", "map_cc": "SE", "name": "Sweden", "eos": "se_walk_forward_eos_v1/dashboard.html", "mid": "se_walk_forward_mid_v1/dashboard.html"}, {"cc": "US", "map_cc": "US", "name": "United States", "eos": "us_walk_forward_eos_v1/dashboard.html", "mid": "us_walk_forward_mid_v1/dashboard.html"}, {"cc": "ZM", "map_cc": "ZM", "name": "Zambia", "eos": "zm_walk_forward_eos_v1/dashboard.html", "mid": "zm_walk_forward_mid_v1/dashboard.html"}], "n_countries": 43, "has_insights": true, "has_screening": false, "screening_href": null, "geojson_href": "assets/world_countries.geojson"};
    const byCc = new Map(DATA.countries.map(c => [c.cc, c]));
    const byMapIso = new Map(DATA.countries.map(c => [c.map_cc || c.cc, c]));
    let horizon = "both";
    let selectedCc = null;

    const topLinks = document.getElementById("top-links");
    if (DATA.has_insights) {
      topLinks.innerHTML += `<a class="pill" href="insights.html">Global insights</a>`;
    }
    if (DATA.has_screening && DATA.screening_href) {
      topLinks.innerHTML += `<a class="pill" href="${DATA.screening_href}">Screening (all)</a>`;
    }
    topLinks.innerHTML += `<span class="pill muted">${DATA.n_countries} countries published</span>`;

    function hasHorizon(c, hz) {
      if (hz === "both") return Boolean(c.eos || c.mid);
      return Boolean(c[hz]);
    }

    function fillForIso(mapIso) {
      const c = byMapIso.get(mapIso);
      if (!c || !hasHorizon(c, horizon)) return "var(--land-missing)";
      if (selectedCc === c.cc) return "var(--land-active)";
      return "var(--land-available)";
    }

    function renderDetail(cc) {
      const el = document.getElementById("detail");
      if (!cc || !byCc.has(cc)) {
        el.innerHTML = `<h3>Select a country</h3><p class="muted">Click a highlighted country on the map.</p>`;
        return;
      }
      const c = byCc.get(cc);
      const eosCls = c.eos ? "" : " disabled";
      const midCls = c.mid ? "" : " disabled";
      el.innerHTML = `
        <h3>${c.name}</h3>
        <div class="cc">${c.cc}</div>
        <a class="dash-link${eosCls}" href="${c.eos || "#"}">End-of-season walk-forward</a>
        <a class="dash-link${midCls}" href="${c.mid || "#"}">Mid-season walk-forward</a>`;
    }

    function selectCountry(cc) {
      selectedCc = cc;
      renderDetail(cc);
      d3.selectAll(".country")
        .attr("fill", d => fillForIso(d.properties.ISO_A2));
    }

    function isoToCountry(mapIso) {
      return byMapIso.get(mapIso) || null;
    }

    const width = 960;
    const height = 520;
    const svg = d3.select("#map-wrap").html("").append("svg")
      .attr("viewBox", `0 0 ${width} ${height}`)
      .attr("role", "img")
      .attr("aria-label", "World map of CY-Bench dashboard countries");

    const g = svg.append("g");
    const projection = d3.geoNaturalEarth1().fitSize([width, height], {type: "Sphere"});
    const path = d3.geoPath(projection);

    d3.json(DATA.geojson_href).then(geo => {
      g.selectAll("path")
        .data(geo.features)
        .join("path")
        .attr("class", d => {
          const c = isoToCountry(d.properties.ISO_A2);
          return c && hasHorizon(c, horizon) ? "country available" : "country";
        })
        .attr("d", path)
        .attr("fill", d => fillForIso(d.properties.ISO_A2))
        .on("click", (event, d) => {
          const c = isoToCountry(d.properties.ISO_A2);
          if (c && hasHorizon(c, horizon)) selectCountry(c.cc);
        });
    }).catch(err => {
      document.getElementById("map-wrap").innerHTML =
        `<p class="muted">Could not load map (${err}). Use the country links in the repository README or open insights.</p>`;
    });

    document.querySelectorAll(".toolbar button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".toolbar button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        horizon = btn.dataset.horizon;
        selectedCc = null;
        renderDetail(null);
        d3.selectAll(".country")
          .attr("class", d => {
            const c = isoToCountry(d.properties.ISO_A2);
            return c && hasHorizon(c, horizon) ? "country available" : "country";
          })
          .attr("fill", d => fillForIso(d.properties.ISO_A2));
      });
    });
  </script>
</body>
</html>
