<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CY-Bench Multi-Model Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 18px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: center; }
    th:first-child, td:first-child { text-align: left; }
    th { background: #f5f5f5; }
    tr.metric-row:hover { background: #fafafa; cursor: pointer; }
    .card { border: 1px solid #ddd; padding: 10px; }
    .toolbar { display: flex; gap: 6px; margin: 8px 0; }
    .toolbar button { padding: 5px 8px; border: 1px solid #bbb; background: #fff; cursor: pointer; }
    .toolbar button.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
    .img-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .img-grid.two { grid-template-columns: 1fr 1fr; }
    img { max-width: 100%; border: 1px solid #ddd; min-height: 120px; }
    .muted { color: #666; }
    td.dataset-cell { text-decoration: underline; cursor: pointer; color: #1f6feb; }
  </style>
</head>
<body>
  <h2>CY-Bench multi-model local dashboard</h2>
  <div class="card">

    <div class="muted" id="coverage-info"></div>
    <div id="heatmap-wrap"></div>
  </div>

      <button data-panel="temporal">Temporal</button>

    <div id="missing-note" class="muted"></div>
    <div id="img-grid" class="img-grid two">
      <img id="drill-image-a" alt="Selected panel image A" />

    </div>
  </div>

 "temporal": "assets/wheat_FR_temporal_c373e4ea.png"}, "view": "region_year", "metric": "nrmse", "value": 0.1799460832440088}, {"model": "xgboost", "dataset": "wheat_FR", "n_regions": 94, "n_years": 5, "images": {"map_actual": "assets/wheat_FR_map_actual.png", "map_pred": "assets/wheat_FR_map_pred_301cfded.png", "scatter": "assets/wheat_FR_scatter_8c61be49.png", "temporal": "assets/wheat_FR_temporal_c373e4ea.png"}, "view": "spatial", "metric": "r", "value": 0.9459456694535552}, {"model": "xgboost", "dataset": "wheat_FR", "n_regions": 94, "n_years": 5, "images": {"map_actual": "assets/wheat_FR_map_actual.png", "map_pred": "assets/wheat_FR_map_pred_301cfded.png", "scatter": "assets/wheat_FR_scatter_8c61be49.png", "temporal": "assets/wheat_FR_temporal_c373e4ea.png"}, "view": "spatial", "metric": "r2", "value": 0.884718255272236}, {"model": "xgboost", "dataset": "wheat_FR", "n_regions": 94, "n_years": 5, "images": {"map_actual": "assets/wheat_FR_map_actual.png", "map_pred": "assets/wheat_FR_map_pred_301cfded.png", "scatter": "assets/wheat_FR_scatter_8c61be49.png", "temporal": "assets/wheat_FR_temporal_c373e4ea.png"}, "view": "temporal", "metric": "r", "value": -0.6732712655095601}, {"model": "xgboost", "dataset": "wheat_FR", "n_regions": 94, "n_years": 5, "images": {"map_actual": "assets/wheat_FR_map_actual.png", "map_pred": "assets/wheat_FR_map_pred_301cfded.png", "scatter": "assets/wheat_FR_scatter_8c61be49.png", "temporal": "assets/wheat_FR_temporal_c373e4ea.png"}, "view": "temporal", "metric": "r2", "value": -0.3421533777123691}, {"model": "xgboost", "dataset": "wheat_FR", "n_regions": 94, "n_years": 5, "images": {"map_actual": "assets/wheat_FR_map_actual.png", "map_pred": "assets/wheat_FR_map_pred_301cfded.png", "scatter": "assets/wheat_FR_scatter_8c61be49.png", "temporal": "assets/wheat_FR_temporal_c373e4ea.png"}, "view": "anomaly", "metric": "r", "value": -0.14747719156190178}, {"model": "xgboost", "dataset": "wheat_FR", "n_regions": 94, "n_years": 5, "images": {"map_actual": "assets/wheat_FR_map_actual.png", "map_pred": "assets/wheat_FR_map_pred_301cfded.png", "scatter": "assets/wheat_FR_scatter_8c61be49.png", "temporal": "assets/wheat_FR_temporal_c373e4ea.png"}, "view": "anomaly", "metric": "r2", "value": -0.4793169008634621}];
    const coverageInfo = document.getElementById("coverage-info");
    const heatmapWrap = document.getElementById("heatmap-wrap");
    const selectionLabel = document.getElementById("selection-label");
    const missingNote = document.getElementById("missing-note");
    const imgGrid = document.getElementById("img-grid");
    const drillImageA = document.getElementById("drill-image-a");
    const drillImageB = document.getElementById("drill-image-b");
    const panelButtons = Array.from(document.querySelectorAll(".toolbar button"));

    let selectedCell = null;
    let activePanel = "maps";

    function formatValue(v) {
      return (v === null || Number.isNaN(v)) ? "-" : v.toFixed(2);
    }

    function renderHeatmap() {
      const grouped = new Map();
      for (const rec of DATA) {
        const key = `${rec.dataset}|||${rec.model}`;
        if (!grouped.has(key)) {
          grouped.set(key, {
            dataset: rec.dataset,
            model: rec.model,
            n_regions: rec.n_regions,
            n_years: rec.n_years,
            images: rec.images || {},
            metrics: {},
          });
        }
        grouped.get(key).metrics[`${rec.view}_${rec.metric}`] = rec.value;
      }
      const rows = Array.from(grouped.values()).sort((a, b) => {
        if (a.dataset === b.dataset) return a.model.localeCompare(b.model);
        return a.dataset.localeCompare(b.dataset);
      });

      const datasets = Array.from(new Set(rows.map(r => r.dataset)));
      const models = Array.from(new Set(rows.map(r => r.model)));
      coverageInfo.textContent = `Rows: ${rows.length} (datasets=${datasets.length}, models=${models.length})`;

      let html = `
<table>
  <thead>
    <tr>
      <th rowspan="2">Dataset</th>
      <th rowspan="2">Model</th>
      <th rowspan="2">N_regions</th>
      <th rowspan="2">N_years</th>
      <th colspan="3">Region-Year</th>
      <th colspan="2">Spatial</th>
      <th colspan="2">Temporal</th>
      <th colspan="2">Anomaly</th>
    </tr>
    <tr>
      <th>r</th><th>R²</th><th>NRMSE</th>
      <th>r</th><th>R²</th>
      <th>r</th><th>R²</th>
      <th>r</th><th>R²</th>
    </tr>
  </thead>
  <tbody>`;
      for (const row of rows) {
        const payload = encodeURIComponent(JSON.stringify(row));
        html += `<tr class="metric-row" data-row="${payload}">
          <td class="dataset-cell" data-dataset="${row.dataset}">${row.dataset}</td>
          <td>${row.model}</td>
          <td>${row.n_regions}</td>
          <td>${row.n_years}</td>
          <td>${formatValue(row.metrics.region_year_r)}</td>
          <td>${formatValue(row.metrics.region_year_r2)}</td>
          <td>${formatValue(row.metrics.region_year_nrmse)}</td>
          <td>${formatValue(row.metrics.spatial_r)}</td>
          <td>${formatValue(row.metrics.spatial_r2)}</td>
          <td>${formatValue(row.metrics.temporal_r)}</td>
          <td>${formatValue(row.metrics.temporal_r2)}</td>
          <td>${formatValue(row.metrics.anomaly_r)}</td>
          <td>${formatValue(row.metrics.anomaly_r2)}</td>
        </tr>`;
      }
      html += "</tbody></table>";
      heatmapWrap.innerHTML = html;
      const metricRows = Array.from(document.querySelectorAll("tr.metric-row"));
      metricRows.forEach(tr => {
        tr.addEventListener("click", () => {
          metricRows.forEach(r => r.style.outline = "none");
          tr.style.outline = "2px solid #111";
          selectedCell = JSON.parse(decodeURIComponent(tr.dataset.row));
          refreshDrill();
        });
      });

      const datasetCells = Array.from(document.querySelectorAll("td.dataset-cell"));
      datasetCells.forEach(dc => {
        dc.addEventListener("click", () => {
          const dataset = dc.dataset.dataset;
          const dsRows = rows.filter(r => r.dataset === dataset).slice();
          if (dsRows.length === 0) return;

          dsRows.sort((a, b) => (b.metrics.region_year_r2 ?? -999) - (a.metrics.region_year_r2 ?? -999));
          selectedCell = dsRows[0];
          refreshDrill();

          metricRows.forEach(r => r.style.outline = "none");
          const targetRow = metricRows.find(r => {
            const rec = JSON.parse(decodeURIComponent(r.dataset.row));
            return rec.dataset === selectedCell.dataset && rec.model === selectedCell.model;
          });
          if (targetRow) targetRow.style.outline = "2px solid #111";
        });
      });

      if (metricRows.length > 0) {
        metricRows[0].click();
      } else {
        selectedCell = null;
        drillImageA.removeAttribute("src");
        drillImageB.removeAttribute("src");
        missingNote.textContent = "No rows found.";
      }
    }

    function refreshDrill() {
      if (!selectedCell) return;
      selectionLabel.textContent = `${selectedCell.dataset} | ${selectedCell.model}`;
      const images = selectedCell.images || {};
      missingNote.textContent = "";

      if (activePanel === "maps") {
        imgGrid.classList.add("two");
        const a = images["map_actual"] || "";
        const b = images["map_pred"] || "";
        if (!a && !b) {
          drillImageA.removeAttribute("src");
          drillImageB.removeAttribute("src");
          missingNote.textContent =
            "No map images found for this run. Generate report assets first (map_actual/map_pred).";
          return;
        }
        if (a) {
          drillImageA.src = a;
        } else {
          drillImageA.removeAttribute("src");
        }
        if (b) {
          drillImageB.src = b;
        } else {
          drillImageB.removeAttribute("src");
        }
        return;
      }

      imgGrid.classList.remove("two");
      drillImageB.removeAttribute("src");
      const path = images[activePanel] || "";
      if (!path) {
        drillImageA.removeAttribute("src");
        missingNote.textContent = `No image found for panel: ${activePanel}`;
        return;
      }
      drillImageA.src = path;
    }

    panelButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        panelButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activePanel = btn.dataset.panel;
        refreshDrill();
      });
    });

    drillImageA.addEventListener("error", () => {
      missingNote.textContent =
        "Could not load image A. Check relative path vs dashboard location.";
    });
    drillImageB.addEventListener("error", () => {
      missingNote.textContent =
        "Could not load image B. Check relative path vs dashboard location.";
    });

    renderHeatmap();
  </script>
</body>
